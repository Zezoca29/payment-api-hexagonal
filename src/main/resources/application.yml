spring:
  application:
    name: payment-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/paymentsdb}
    username: ${DATABASE_USERNAME:payments}
    password: ${DATABASE_PASSWORD:payments}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, flyway
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: HexaPay Payment API
    version: '@project.version@'
    description: Payment API with Hexagonal Architecture

logging:
  level:
    com.hexapay: INFO
    org.springframework.web: WARN
    org.hibernate: WARN

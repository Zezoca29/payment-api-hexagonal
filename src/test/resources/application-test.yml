spring:
  # Datasource URL is intentionally omitted here.
  # Integration tests use @DynamicPropertySource + TestContainers to inject the real URL
  # before the ApplicationContext is created. Unit tests do not need a datasource at all.
  datasource:
    username: payments
    password: payments
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

logging:
  level:
    com.hexapay: DEBUG
